<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비만도 측정기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up { animation: fadeInUp 0.35s ease-out; }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-100 to-slate-200 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    // ========================================
    // React Hooks
    // ========================================
    const { useState } = React;

    // ========================================
    // 🎨 Design System Components
    // ========================================
    function Card({ children, className = "" }) {
      return (
        <div className={`bg-white rounded-2xl shadow-xl p-6 sm:p-8 ${className}`}>
          {children}
        </div>
      );
    }

    function Input({ label, unit, value, onChange, placeholder, error }) {
      return (
        <div className="w-full">
          <label className="block text-sm font-semibold text-slate-700 mb-1.5">
            {label}
          </label>
          <div className="relative">
            <input
              type="number"
              inputMode="decimal"
              value={value}
              onChange={onChange}
              placeholder={placeholder}
              className={`w-full px-4 py-3 pr-12 rounded-xl border bg-slate-50 text-slate-900 text-lg
                focus:outline-none focus:ring-2 transition
                ${error
                  ? "border-red-400 focus:ring-red-300"
                  : "border-slate-200 focus:ring-indigo-300 focus:border-indigo-400"}`}
            />
            {unit && (
              <span className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 font-medium">
                {unit}
              </span>
            )}
          </div>
        </div>
      );
    }

    function Button({ children, onClick, variant = "primary", className = "" }) {
      const variants = {
        primary: "bg-indigo-600 hover:bg-indigo-700 text-white shadow-lg shadow-indigo-200",
        ghost: "bg-slate-100 hover:bg-slate-200 text-slate-700",
      };
      return (
        <button
          onClick={onClick}
          className={`w-full py-3.5 rounded-xl font-bold text-lg transition active:scale-[0.98] ${variants[variant]} ${className}`}
        >
          {children}
        </button>
      );
    }

    // ========================================
    // 🧮 BMI Logic
    // ========================================
    // Korean / WHO Asia-Pacific BMI categories
    function classifyBMI(bmi) {
      if (bmi < 18.5) {
        return {
          label: "저체중",
          desc: "체중이 평균보다 낮아요. 균형 잡힌 영양 섭취가 필요해요.",
          text: "text-sky-600",
          bg: "bg-sky-50",
          border: "border-sky-200",
          bar: "bg-sky-500",
        };
      }
      if (bmi < 23) {
        return {
          label: "정상",
          desc: "건강한 체중 범위예요. 지금처럼 잘 관리하세요!",
          text: "text-emerald-600",
          bg: "bg-emerald-50",
          border: "border-emerald-200",
          bar: "bg-emerald-500",
        };
      }
      if (bmi < 25) {
        return {
          label: "과체중",
          desc: "정상보다 조금 높아요. 식습관과 운동에 신경 써 보세요.",
          text: "text-amber-600",
          bg: "bg-amber-50",
          border: "border-amber-200",
          bar: "bg-amber-500",
        };
      }
      if (bmi < 30) {
        return {
          label: "비만",
          desc: "비만 단계예요. 규칙적인 운동과 식단 관리가 필요해요.",
          text: "text-orange-600",
          bg: "bg-orange-50",
          border: "border-orange-200",
          bar: "bg-orange-500",
        };
      }
      return {
        label: "고도비만",
        desc: "고도비만 단계예요. 전문가와 상담을 권장해요.",
        text: "text-red-600",
        bg: "bg-red-50",
        border: "border-red-200",
        bar: "bg-red-600",
      };
    }

    const CATEGORIES = [
      { label: "저체중", range: "18.5 미만", color: "bg-sky-500" },
      { label: "정상", range: "18.5 ~ 23", color: "bg-emerald-500" },
      { label: "과체중", range: "23 ~ 25", color: "bg-amber-500" },
      { label: "비만", range: "25 ~ 30", color: "bg-orange-500" },
      { label: "고도비만", range: "30 이상", color: "bg-red-600" },
    ];

    // ========================================
    // 📄 Result Component
    // ========================================
    function Result({ bmi, info }) {
      return (
        <div className={`mt-6 rounded-2xl border ${info.border} ${info.bg} p-6 animate-fade-in-up`}>
          <p className="text-center text-sm font-medium text-slate-500">회원님의 BMI 지수</p>
          <p className={`text-center text-6xl font-extrabold mt-1 ${info.text}`}>
            {bmi.toFixed(1)}
          </p>
          <div className="flex justify-center mt-3">
            <span className={`px-4 py-1.5 rounded-full text-white font-bold ${info.bar}`}>
              {info.label}
            </span>
          </div>
          <p className="text-center text-slate-600 mt-4 text-sm leading-relaxed">
            {info.desc}
          </p>
        </div>
      );
    }

    // ========================================
    // 📊 Category Legend
    // ========================================
    function Legend({ activeLabel }) {
      return (
        <div className="mt-6">
          <p className="text-sm font-semibold text-slate-700 mb-2">비만도 분류 기준</p>
          <div className="space-y-1.5">
            {CATEGORIES.map((c) => (
              <div
                key={c.label}
                className={`flex items-center justify-between px-3 py-2 rounded-lg text-sm transition
                  ${activeLabel === c.label ? "bg-slate-100 ring-1 ring-slate-300 font-bold" : ""}`}
              >
                <span className="flex items-center gap-2 text-slate-700">
                  <span className={`w-3 h-3 rounded-full ${c.color}`}></span>
                  {c.label}
                </span>
                <span className="text-slate-400">{c.range}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ========================================
    // 🚀 App Component
    // ========================================
    function App() {
      const [height, setHeight] = useState("");
      const [weight, setWeight] = useState("");
      const [error, setError] = useState("");
      const [result, setResult] = useState(null);

      const calculate = () => {
        const h = parseFloat(height);
        const w = parseFloat(weight);

        if (height.trim() === "" || weight.trim() === "") {
          setError("키와 몸무게를 모두 입력해 주세요.");
          setResult(null);
          return;
        }
        if (isNaN(h) || isNaN(w)) {
          setError("숫자만 입력해 주세요.");
          setResult(null);
          return;
        }
        if (h <= 0 || w <= 0) {
          setError("0보다 큰 값을 입력해 주세요.");
          setResult(null);
          return;
        }
        if (h < 50 || h > 250) {
          setError("키는 50cm ~ 250cm 사이로 입력해 주세요.");
          setResult(null);
          return;
        }
        if (w < 5 || w > 500) {
          setError("몸무게는 5kg ~ 500kg 사이로 입력해 주세요.");
          setResult(null);
          return;
        }

        const meters = h / 100;
        const bmi = w / (meters * meters);
        setError("");
        setResult({ bmi, info: classifyBMI(bmi) });
      };

      const reset = () => {
        setHeight("");
        setWeight("");
        setError("");
        setResult(null);
      };

      const onEnter = (e) => {
        if (e.key === "Enter") calculate();
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <div className="w-full max-w-md">
            {/* Header */}
            <div className="text-center mb-6">
              <h1 className="text-3xl font-extrabold text-slate-800 flex items-center justify-center gap-2">
                <span>⚖️</span> 비만도 측정기
              </h1>
              <p className="text-slate-500 mt-2 text-sm">
                키와 몸무게를 입력하면 BMI 지수를 계산해 드려요
              </p>
            </div>

            <Card>
              <div className="space-y-4" onKeyDown={onEnter}>
                <Input
                  label="키"
                  unit="cm"
                  value={height}
                  onChange={(e) => setHeight(e.target.value)}
                  placeholder="예: 170"
                  error={error && height.trim() === ""}
                />
                <Input
                  label="몸무게"
                  unit="kg"
                  value={weight}
                  onChange={(e) => setWeight(e.target.value)}
                  placeholder="예: 65"
                  error={error && weight.trim() === ""}
                />
              </div>

              {error && (
                <p className="mt-4 text-sm text-red-500 bg-red-50 border border-red-200 rounded-lg px-3 py-2 text-center animate-fade-in-up">
                  ⚠️ {error}
                </p>
              )}

              <div className="mt-5 flex gap-3">
                <Button onClick={calculate}>계산하기</Button>
                <Button onClick={reset} variant="ghost" className="!w-auto px-5">
                  초기화
                </Button>
              </div>

              {result && <Result bmi={result.bmi} info={result.info} />}

              <Legend activeLabel={result ? result.info.label : null} />
            </Card>

            <p className="text-center text-xs text-slate-400 mt-5">
              * 본 결과는 WHO 아시아·태평양 기준이며 참고용입니다.
            </p>
          </div>
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
