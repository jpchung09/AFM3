<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>세금계산기</title>

  <!-- Tailwind CSS: 유틸리티 클래스로 스타일을 쉽게 적용할 수 있게 해줍니다 -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React: UI를 만드는 라이브러리 -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <!-- ReactDOM: React 컴포넌트를 실제 HTML에 그려주는 라이브러리 -->
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <!-- Babel: 브라우저가 JSX 문법을 이해할 수 있게 변환해줍니다 -->
  <script src="https://unpkg.com/@babel/standalone@7.25.9/babel.min.js"></script>
</head>
<body class="bg-slate-100">
  <!-- React가 화면을 그릴 위치입니다 -->
  <div id="root"></div>

  <!-- JSX를 사용하려면 type을 "text/babel"로 지정해야 합니다 -->
  <script type="text/babel">
    // ========================================
    // React Hooks 가져오기
    // useState: 컴포넌트 안에서 변하는 값(상태)을 관리하는 도구입니다
    // ========================================
    const { useState } = React;

    // ========================================
    // 숫자를 "1,234원" 처럼 천 단위 콤마와 함께 보여주는 함수
    // ========================================
    const formatWon = (num) => Math.round(num).toLocaleString('ko-KR') + '원';

    // ========================================
    // 🧾 TaxCalculator 컴포넌트
    // 부가가치세(VAT)를 계산해줍니다.
    //  - "공급가액 → 합계" : 공급가액에 세금을 더해 합계를 구합니다
    //  - "합계 → 공급가액" : 세금이 포함된 합계에서 세금을 분리합니다
    // ========================================
    function TaxCalculator() {
      // 입력 금액 (문자열로 받아서 계산할 때 숫자로 변환합니다)
      const [amount, setAmount] = useState('');
      // 세율(%) — 한국 부가세 기본 10%
      const [taxRate, setTaxRate] = useState(10);
      // 계산 방향: 'add' = 세금 더하기, 'extract' = 세금 분리하기
      const [mode, setMode] = useState('add');

      // 문자열 입력을 안전하게 숫자로 변환 (빈 값이면 0)
      const amountNum = Number(amount) || 0;
      const rate = taxRate / 100;

      // 모드에 따라 공급가액 / 세액 / 합계를 계산합니다
      let supply, tax, total;
      if (mode === 'add') {
        // 입력값이 공급가액(세전)이라고 보고 세금을 더합니다
        supply = amountNum;
        tax = amountNum * rate;
        total = supply + tax;
      } else {
        // 입력값이 세금 포함 합계라고 보고 세금을 분리합니다
        total = amountNum;
        supply = amountNum / (1 + rate);
        tax = total - supply;
      }

      // 입력값을 모두 초기화하는 함수
      const reset = () => {
        setAmount('');
        setTaxRate(10);
        setMode('add');
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <div className="bg-white rounded-2xl shadow-lg p-8 w-full max-w-sm">
            {/* 제목 영역 */}
            <h1 className="text-2xl font-bold text-slate-800 mb-1 text-center">
              🧾 세금계산기
            </h1>
            <p className="text-slate-500 mb-6 text-sm text-center">
              부가가치세(VAT)를 간편하게 계산해 드립니다
            </p>

            {/* 계산 방향 선택: 세금 더하기 / 세금 분리하기 */}
            <div className="flex gap-2 mb-5">
              <button
                onClick={() => setMode('add')}
                className={
                  "flex-1 py-2 rounded-lg text-sm font-semibold transition active:scale-95 " +
                  (mode === 'add'
                    ? "bg-emerald-600 text-white"
                    : "bg-slate-100 text-slate-600 hover:bg-slate-200")
                }
              >
                세금 더하기
              </button>
              <button
                onClick={() => setMode('extract')}
                className={
                  "flex-1 py-2 rounded-lg text-sm font-semibold transition active:scale-95 " +
                  (mode === 'extract'
                    ? "bg-emerald-600 text-white"
                    : "bg-slate-100 text-slate-600 hover:bg-slate-200")
                }
              >
                세금 분리하기
              </button>
            </div>

            {/* 금액 입력 */}
            <label className="block text-sm font-semibold text-slate-700 mb-1">
              {mode === 'add' ? '공급가액 (세전 금액)' : '합계 (세금 포함 금액)'}
            </label>
            <div className="relative mb-5">
              <input
                type="number"
                value={amount}
                onChange={(e) => setAmount(e.target.value)}
                placeholder="예: 100000"
                className="w-full border border-slate-300 rounded-lg px-4 py-3 pr-10 text-right text-lg focus:outline-none focus:ring-2 focus:ring-emerald-500"
              />
              <span className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400">
                원
              </span>
            </div>

            {/* 세율 선택 버튼들 */}
            <label className="block text-sm font-semibold text-slate-700 mb-1">
              세율
            </label>
            <div className="flex gap-2 mb-6">
              {[10, 5, 3, 0].map((r) => (
                <button
                  key={r}
                  onClick={() => setTaxRate(r)}
                  className={
                    "flex-1 py-2 rounded-lg text-sm font-semibold transition active:scale-95 " +
                    (taxRate === r
                      ? "bg-emerald-600 text-white"
                      : "bg-slate-100 text-slate-600 hover:bg-slate-200")
                  }
                >
                  {r}%
                </button>
              ))}
            </div>

            {/* 결과 표시 영역: 세액 강조 */}
            <div className="bg-emerald-50 rounded-xl p-5 text-center mb-4">
              <p className="text-sm text-emerald-600 mb-1">부가세 ({taxRate}%)</p>
              <p className="text-4xl font-extrabold text-emerald-700">
                {formatWon(tax)}
              </p>
            </div>

            {/* 부가 정보: 공급가액 / 합계 */}
            <div className="text-sm text-slate-500 space-y-1 mb-4">
              <div className="flex justify-between">
                <span>공급가액</span>
                <span className="font-semibold text-slate-700">
                  {formatWon(supply)}
                </span>
              </div>
              <div className="flex justify-between">
                <span>합계 (공급가액 + 부가세)</span>
                <span className="font-semibold text-slate-700">
                  {formatWon(total)}
                </span>
              </div>
            </div>

            {/* 초기화 버튼 */}
            <button
              onClick={reset}
              className="w-full text-sm text-slate-400 hover:text-slate-600 underline"
            >
              초기화
            </button>
          </div>
        </div>
      );
    }

    // ========================================
    // 렌더링: TaxCalculator 컴포넌트를 #root 안에 그립니다
    // ========================================
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<TaxCalculator />);
  </script>
</body>
</html>
