<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나이 계산기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up { animation: fadeInUp 0.5s ease-out both; }

    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.85); }
      60% { transform: scale(1.04); }
      100% { opacity: 1; transform: scale(1); }
    }
    .animate-pop-in { animation: popIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) both; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-6px); }
      40%, 80% { transform: translateX(6px); }
    }
    .animate-shake { animation: shake 0.4s ease-in-out both; }
  </style>
</head>
<body class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    // ========================================
    // React Hooks
    // ========================================
    const { useState, useRef, useCallback } = React;

    // ========================================
    // 🎨 Design System Components
    // ========================================
    function Button({ variant = 'primary', size = 'md', disabled = false, onClick, className = '', children, type = 'button' }) {
      const base = 'inline-flex items-center justify-center font-semibold rounded-xl transition-all duration-200 focus:outline-none focus:ring-4 disabled:opacity-50 disabled:cursor-not-allowed active:scale-95';
      const variants = {
        primary: 'bg-indigo-600 text-white hover:bg-indigo-700 focus:ring-indigo-300 shadow-lg shadow-indigo-500/30',
        secondary: 'bg-gray-100 text-gray-700 hover:bg-gray-200 focus:ring-gray-200',
        ghost: 'bg-transparent text-indigo-600 hover:bg-indigo-50 focus:ring-indigo-100',
      };
      const sizes = {
        sm: 'px-3 py-1.5 text-sm',
        md: 'px-5 py-2.5 text-base',
        lg: 'px-6 py-3 text-lg',
      };
      return (
        <button
          type={type}
          onClick={onClick}
          disabled={disabled}
          className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}
        >
          {children}
        </button>
      );
    }

    function Card({ className = '', children }) {
      return (
        <div className={`bg-white rounded-3xl shadow-2xl ${className}`}>
          {children}
        </div>
      );
    }

    function Input({ type = 'text', label, value, onChange, onKeyDown, max, error }) {
      return (
        <div className="w-full">
          {label && (
            <label className="block mb-2 text-sm font-semibold text-gray-700">
              {label}
            </label>
          )}
          <input
            type={type}
            value={value}
            onChange={onChange}
            onKeyDown={onKeyDown}
            max={max}
            className={`w-full px-4 py-3 text-lg rounded-xl border-2 bg-gray-50 text-gray-800 transition-colors focus:outline-none focus:ring-4 ${
              error
                ? 'border-red-400 focus:border-red-500 focus:ring-red-100'
                : 'border-gray-200 focus:border-indigo-500 focus:ring-indigo-100'
            }`}
          />
          {error && (
            <p className="mt-2 text-sm text-red-500 font-medium animate-shake">
              {error}
            </p>
          )}
        </div>
      );
    }

    function StatBox({ value, label, accent = 'indigo' }) {
      const accents = {
        indigo: 'from-indigo-50 to-indigo-100 text-indigo-700',
        purple: 'from-purple-50 to-purple-100 text-purple-700',
        pink: 'from-pink-50 to-pink-100 text-pink-700',
      };
      return (
        <div className={`flex flex-col items-center justify-center rounded-2xl bg-gradient-to-br ${accents[accent]} p-4`}>
          <span className="text-2xl font-bold">{value}</span>
          <span className="mt-1 text-xs font-medium text-gray-500">{label}</span>
        </div>
      );
    }

    // ========================================
    // 🧮 Age Calculation Logic
    // ========================================
    function calculateAge(birthDate, today) {
      // 만 나이 (Korean international/full age)
      let age = today.getFullYear() - birthDate.getFullYear();
      const monthDiff = today.getMonth() - birthDate.getMonth();
      const dayDiff = today.getDate() - birthDate.getDate();
      if (monthDiff < 0 || (monthDiff === 0 && dayDiff < 0)) {
        age -= 1;
      }

      // 총 살아온 일수 (total days lived)
      const msPerDay = 1000 * 60 * 60 * 24;
      const startOfBirth = new Date(birthDate.getFullYear(), birthDate.getMonth(), birthDate.getDate());
      const startOfToday = new Date(today.getFullYear(), today.getMonth(), today.getDate());
      const totalDays = Math.floor((startOfToday - startOfBirth) / msPerDay);

      // 다음 생일까지 남은 일수 (days until next birthday)
      let nextBirthday = new Date(today.getFullYear(), birthDate.getMonth(), birthDate.getDate());
      if (nextBirthday < startOfToday) {
        nextBirthday = new Date(today.getFullYear() + 1, birthDate.getMonth(), birthDate.getDate());
      }
      const daysUntilBirthday = Math.round((nextBirthday - startOfToday) / msPerDay);
      const isBirthdayToday = daysUntilBirthday === 0;

      return { age, totalDays, daysUntilBirthday, isBirthdayToday };
    }

    // ========================================
    // 📄 Page Component
    // ========================================
    function AgeCalculator() {
      const [birth, setBirth] = useState('');
      const [error, setError] = useState('');
      const [result, setResult] = useState(null);
      const inputRef = useRef(null);

      // 오늘 날짜를 input max 속성용 문자열로 (런타임 계산)
      const todayStr = new Date().toISOString().split('T')[0];

      const handleCalculate = useCallback(() => {
        if (!birth) {
          setError('생년월일을 입력해 주세요.');
          setResult(null);
          return;
        }

        const birthDate = new Date(birth + 'T00:00:00');
        if (isNaN(birthDate.getTime())) {
          setError('올바른 날짜를 입력해 주세요.');
          setResult(null);
          return;
        }

        // 런타임에 오늘 날짜 계산 — 절대 하드코딩하지 않음
        const today = new Date();
        const startOfToday = new Date(today.getFullYear(), today.getMonth(), today.getDate());

        if (birthDate > startOfToday) {
          setError('미래 날짜는 입력할 수 없어요. 오늘 이전 날짜를 선택해 주세요.');
          setResult(null);
          return;
        }

        setError('');
        setResult(calculateAge(birthDate, today));
      }, [birth]);

      const handleReset = useCallback(() => {
        setBirth('');
        setError('');
        setResult(null);
        if (inputRef.current) inputRef.current.focus();
      }, []);

      const handleKeyDown = useCallback((e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          handleCalculate();
        }
      }, [handleCalculate]);

      const handleChange = useCallback((e) => {
        setBirth(e.target.value);
        if (error) setError('');
      }, [error]);

      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <Card className="w-full max-w-md p-8 animate-fade-in-up">
            {/* 헤더 */}
            <div className="text-center mb-8">
              <div className="text-5xl mb-3">🎂</div>
              <h1 className="text-3xl font-extrabold text-gray-800">나이 계산기</h1>
              <p className="mt-2 text-sm text-gray-500">
                생년월일을 입력하면 만 나이를 알려드려요
              </p>
            </div>

            {/* 입력 영역 */}
            <div className="space-y-5">
              <div onKeyDown={handleKeyDown}>
                <Input
                  type="date"
                  label="생년월일 (生年月日)"
                  value={birth}
                  onChange={handleChange}
                  max={todayStr}
                  error={error}
                />
                {/* ref를 위해 숨김 핸들링 — 날짜 input에 직접 ref 연결 */}
              </div>

              <div className="flex gap-3">
                <Button onClick={handleCalculate} size="lg" className="flex-1">
                  계산하기
                </Button>
                <Button onClick={handleReset} variant="secondary" size="lg">
                  초기화
                </Button>
              </div>
            </div>

            {/* 결과 영역 */}
            {result && (
              <div key={birth + result.age} className="mt-8 animate-pop-in">
                <div className="text-center rounded-2xl bg-gradient-to-br from-indigo-600 to-purple-600 p-6 text-white shadow-xl shadow-indigo-500/30">
                  <p className="text-sm opacity-90">당신의 만 나이는</p>
                  <p className="mt-1 text-5xl font-extrabold tracking-tight">
                    만 {result.age}세
                  </p>
                </div>

                <div className="mt-4 grid grid-cols-2 gap-3">
                  <StatBox
                    value={`${result.totalDays.toLocaleString('ko-KR')}일`}
                    label="살아온 날"
                    accent="purple"
                  />
                  {result.isBirthdayToday ? (
                    <StatBox value="🎉 오늘!" label="생일" accent="pink" />
                  ) : (
                    <StatBox
                      value={`${result.daysUntilBirthday}일`}
                      label="다음 생일까지"
                      accent="pink"
                    />
                  )}
                </div>

                {result.isBirthdayToday && (
                  <p className="mt-4 text-center text-lg font-semibold text-pink-600">
                    🎈 생일을 축하합니다! 🎈
                  </p>
                )}
              </div>
            )}
          </Card>
        </div>
      );
    }

    // ========================================
    // 🚀 App
    // ========================================
    function App() {
      return <AgeCalculator />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
